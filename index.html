<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citadel Labs</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 700px; margin: 80px auto; padding: 0 20px; color: #333; line-height: 1.7; text-align: center; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p.tagline { color: #666; font-size: 18px; margin-bottom: 40px; }
    .apps { text-align: left; margin: 0 auto; max-width: 400px; }
    .app { margin-bottom: 24px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 12px; }
    .app h2 { font-size: 18px; margin: 0 0 4px 0; }
    .app p { margin: 0; color: #666; font-size: 14px; }
    .app a { display: inline-block; margin-top: 8px; color: #007AFF; text-decoration: none; font-size: 14px; }
    a:hover { text-decoration: underline; }
    .footer { margin-top: 60px; font-size: 14px; color: #888; }
    .footer a { color: #888; }
  </style>
</head>
<body>
  <h1>Citadel Labs</h1>
  <p class="tagline">Simple tools for everyday life.</p>

  <div class="apps">
    <div class="app">
      <h2>Rebill</h2>
      <p>Track your subscriptions. See what you're really spending.</p>
      <a href="/rebill-privacy">Privacy Policy</a>
    </div>
    <div class="app">
      <h2>BillKeep</h2>
      <p>Smart bill tracker with AI-powered receipt scanning.</p>
      <a href="/billkeep-privacy">Privacy Policy</a>
    </div>
  </div>

  <p class="footer">
    <a href="mailto:support@citadellabs.app">support@citadellabs.app</a><br>
    &copy; 2026 Citadel Labs
  </p>
</body>
</html>
